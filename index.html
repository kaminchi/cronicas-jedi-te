<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Jedi del Té">
<meta name="theme-color" content="#5b3a8f">
<title>Crónicas de una Jedi del Té</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%235b3a8f'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle'%3E%F0%9F%AB%96%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#f3effa;
  --card:#ffffff;
  --ink:#2a2433;
  --ink-soft:#6b6075;
  --ink-faint:#9b90a8;
  --border:#e4daf0;
  --green:#5b3a8f;
  --green-light:#ece3f8;
  --orange:#8a4fae;
  --orange-light:#f3e7fb;
  --star:#9b6bd6;
  --star-off:#ddd2ec;
  --shadow:0 1px 2px rgba(0,0,0,0.05);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-tap-highlight-color:transparent;
  padding-bottom:90px;
}
.header{
  position:sticky;top:0;z-index:20;
  background:var(--green);
  color:#fff;
  padding:18px 20px 14px;
  border-radius:0 0 18px 18px;
  box-shadow:0 2px 8px rgba(0,0,0,0.12);
}
.header h1{margin:0;font-size:19px;font-weight:600;}
.header p{margin:4px 0 0;font-size:13px;opacity:0.85;}
.stats-row{
  display:flex;gap:10px;margin-top:14px;
}
.stat{
  flex:1;background:rgba(255,255,255,0.14);
  border-radius:12px;padding:8px 10px;text-align:center;
}
.stat .num{font-size:18px;font-weight:700;display:block;}
.stat .lbl{font-size:10.5px;opacity:0.85;}

.backup-row{display:flex;gap:8px;margin-top:10px;}
.backup-btn{
  flex:1;background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.25);
  color:#fff;font-size:11.5px;font-weight:600;padding:8px 6px;border-radius:10px;
}
.backup-btn:active{background:rgba(255,255,255,0.26);}

.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;font-size:13px;font-weight:600;
  padding:10px 18px;border-radius:30px;z-index:50;box-shadow:0 4px 14px rgba(0,0,0,0.25);
  opacity:0;transition:opacity 0.25s;pointer-events:none;
}
.toast.show{opacity:1;}

.tabs{
  display:flex;gap:8px;padding:14px 16px 6px;
}
.tab{
  flex:1;text-align:center;padding:9px 0;border-radius:10px;
  font-size:13px;font-weight:600;color:var(--ink-soft);
  background:var(--card);border:1px solid var(--border);
}
.tab.active{background:var(--green);color:#fff;border-color:var(--green);}

.filters{
  display:flex;gap:8px;padding:8px 16px;overflow-x:auto;
  -ms-overflow-style:none;scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto;font-size:12.5px;font-weight:600;
  padding:7px 13px;border-radius:20px;border:1px solid var(--border);
  background:var(--card);color:var(--ink-soft);white-space:nowrap;
}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}

.search-wrap{padding:6px 16px 4px;}
.search-wrap input{
  width:100%;padding:10px 14px;border-radius:12px;border:1px solid var(--border);
  font-size:14px;background:var(--card);color:var(--ink);
}
.search-wrap input::placeholder{color:var(--ink-faint);}

#list{padding:6px 16px 10px;display:flex;flex-direction:column;gap:10px;}

.card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:14px 16px;box-shadow:var(--shadow);
}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.card-name{font-size:16px;font-weight:700;margin:0;}
.badge-row{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;}
.badge{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:8px;}
.badge.brand-hebras{background:var(--orange-light);color:#6b2f8a;}
.badge.brand-zen{background:var(--green-light);color:#5b3a8f;}
.badge.teina-si{background:#f3e7fb;color:#7a3b9c;}
.badge.teina-no{background:#ece6f2;color:#5c5068;}
.score-pill{
  flex:0 0 auto;display:flex;align-items:center;gap:3px;
  background:var(--green-light);color:#2c4a35;font-weight:700;
  font-size:13px;padding:5px 9px;border-radius:10px;min-height:28px;
}
.score-pill.empty{background:var(--bg);color:var(--ink-faint);}

.card-desc{font-size:13px;color:var(--ink-soft);margin:9px 0 0;line-height:1.45;}
.card-meta{display:flex;gap:14px;margin-top:9px;font-size:11.5px;color:var(--ink-faint);}
.card-meta span{display:flex;align-items:center;gap:4px;}

.card-foot{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:11px;padding-top:11px;border-top:1px solid var(--border);
}
.tried-toggle{
  display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-soft);font-weight:600;
}
.switch{
  width:38px;height:22px;border-radius:12px;background:var(--star-off);
  position:relative;flex:0 0 auto;
}
.switch.on{background:var(--green);}
.switch .dot{
  width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;
  top:2px;left:2px;transition:left 0.15s;box-shadow:0 1px 2px rgba(0,0,0,0.25);
}
.switch.on .dot{left:18px;}

.expand-btn{
  font-size:12.5px;font-weight:600;color:var(--green);
  background:none;border:none;padding:0;
}

.expand-panel{display:none;margin-top:12px;border-top:1px solid var(--border);padding-top:12px;}
.expand-panel.open{display:block;}

.stars{display:flex;gap:4px;margin-bottom:10px;}
.star-btn{
  background:none;border:none;padding:0;font-size:26px;line-height:1;
  color:var(--star-off);width:32px;text-align:center;
}
.star-btn.filled{color:var(--star);}

textarea.review{
  width:100%;min-height:70px;border:1px solid var(--border);border-radius:10px;
  padding:9px 11px;font-size:13.5px;font-family:inherit;color:var(--ink);
  background:var(--bg);resize:vertical;
}
textarea.review::placeholder{color:var(--ink-faint);}

.empty-msg{
  text-align:center;color:var(--ink-faint);font-size:13.5px;padding:40px 20px;
}

.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:var(--card);border-top:1px solid var(--border);
  display:flex;justify-content:center;padding:10px 16px;
  box-shadow:0 -2px 8px rgba(0,0,0,0.06);
}
.bottom-bar p{margin:0;font-size:11.5px;color:var(--ink-faint);text-align:center;}

.howto{
  margin:10px 16px 4px;background:var(--orange-light);border-radius:14px;
  padding:13px 15px;font-size:12.5px;color:#5b2f78;line-height:1.5;
}
.howto b{color:#6b2f8a;}
.howto button{
  margin-top:8px;background:#fff;border:1px solid #ddc4ec;color:#6b2f8a;
  font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;
}

#ranking-list{padding:6px 16px 20px;}
.rank-card{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:12px 14px;margin-bottom:9px;box-shadow:var(--shadow);
}
.rank-num{
  width:30px;height:30px;border-radius:50%;background:var(--green-light);
  color:#5b3a8f;font-weight:700;font-size:13px;display:flex;
  align-items:center;justify-content:center;flex:0 0 auto;
}
.rank-num.top1{background:var(--star);color:#fff;}
.rank-body{flex:1;min-width:0;}
.rank-name{font-size:14.5px;font-weight:700;margin:0;}
.rank-review{font-size:12px;color:var(--ink-soft);margin:3px 0 0;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;}
.rank-score{font-size:13px;font-weight:700;color:var(--star);flex:0 0 auto;}
</style>
</head>
<body>

<div class="header">
  <h1>Crónicas de una Jedi del Té</h1>
  <p>Tu diario de tés: probá, puntuá y guardá tus reseñas</p>
  <div class="stats-row">
    <div class="stat"><span class="num" id="stat-tried">0/30</span><span class="lbl">probados</span></div>
    <div class="stat"><span class="num" id="stat-avg">–</span><span class="lbl">promedio</span></div>
    <div class="stat"><span class="num" id="stat-fav">–</span><span class="lbl">favorito</span></div>
  </div>
  <div class="backup-row">
    <button type="button" id="btn-export" class="backup-btn">⬇️ Exportar mis datos</button>
    <button type="button" id="btn-import" class="backup-btn">⬆️ Importar datos</button>
  </div>
  <input type="file" id="file-import" accept="application/json" style="display:none;">
</div>

<div class="tabs">
  <div class="tab active" data-tab="list">Todos los tés</div>
  <div class="tab" data-tab="ranking">Mi ranking</div>
</div>

<div id="view-list">
  <div class="filters" id="filters"></div>
  <div class="search-wrap"><input type="text" id="search" placeholder="Buscar un té..."></div>
  <div id="list"></div>
</div>

<div id="view-ranking" style="display:none;">
  <div id="ranking-list"></div>
</div>

<div class="bottom-bar"><p>Tus datos se guardan solo en este celular 🤍 — usá "Exportar" si cambiás de celular</p></div>
<div class="toast" id="toast"></div>

<script>

{m:"Inti Hebras",n:"Verde Sencha Puro",t:"Té verde",te:"Sí",d:"Fukujyu Sencha: té verde japonés con hojas de la cosecha de primavera en las laderas del monte Fuji. Puro, sin mezclas.",temp:"82°C",time:"2 min"},
{m:"Inti Hebras",n:"Feeling Happy",t:"Té negro",te:"Sí",d:"Té negro con notas exóticas, dulces y afrutadas: mango, maracuyá y pétalos de rosa. Perfecto frío o caliente.",temp:"95°C",time:"3-4 min"},
{m:"Inti Zen",n:"Dulce Manzanilla",t:"Infusión",te:"No",d:"Flores de manzanilla relajantes con perfume de miel y un toque cítrico de melisa. Tisana dulce y suave, ideal antes de descansar.",temp:"95-100°C",time:"8-10 min"},

{m:"Inti Zen",n:"Golden Chai",t:"Té negro",te:"Sí",d:"Té negro de la India con cúrcuma, jengibre, canela y clavo. Ligeramente picante, rico en antioxidantes. Perfecto solo o con leche.",temp:"90-95°C",time:"3-5 min"},

{m:"Inti Zen",n:"Tres Mentas",t:"Infusión",te:"No",d:"Menta piperita egipcia, menta verde y menta silvestre. Blend vibrante, aromático y digestivo, ideal después de comer.",temp:"95-100°C",time:"8-10 min"},

{m:"Inti Zen",n:"Inti Yoga",t:"Infusión",te:"No",d:"Lemongrass (detox y antioxidante) combinado con rosa mosqueta y jengibre. Equilibrio entre lo picante y lo depurativo.",temp:"95-100°C",time:"8-10 min"},

{m:"Inti Zen",n:"Inca Rose",t:"Té negro",te:"Sí",d:"Ceylon con esencia pura de bergamota italiana, perfumado con pétalos de rosa. Un Earl Grey floral.",temp:"90-95°C",time:"3-5 min"},
{m:"Inti Zen",n:"Inti Grey",t:"Té negro",te:"Sí",d:"Té negro de Ceylon con esencia pura de bergamota. Clásico Earl Grey, sutilmente perfumado, notas cítricas.",temp:"90-95°C",time:"3-5 min"},
{m:"Inti Zen",n:"Patagonia Bee",t:"Té negro",te:"Sí",d:"Miel de la Patagonia, vainilla y cacao mexicano sobre una base de té negro. Dulce, suave y reconfortante.",temp:"90-95°C",time:"3-5 min"},
{m:"Inti Zen",n:"Silencio Andino",t:"Té verde",te:"Sí",d:"Cedrón de la pre-cordillera Andina y cascaritas de naranja del litoral argentino sobre té verde Oriental. Aroma suave y cítrico.",temp:"80-82°C",time:"2-3 min"},
{m:"Inti Zen",n:"Don Juan",t:"Té negro",te:"Sí",d:"Aroma suave a chocolate y notas de vainilla, con un toque de frutos rojos, sobre té negro con dulce de leche.",temp:"90-95°C",time:"3-5 min"},
{m:"Inti Zen",n:"Blanco Lychee",t:"Té blanco",te:"Sí",d:"Té blanco de Fujian (brotes cosechados solo una vez al año). Fragancia sutil con notas de cedrón y sabor de lychee.",temp:"75-80°C",time:"2-3 min"},
{m:"Inti Zen",n:"Amazonia Mango",t:"Té negro",te:"Sí",d:"Mango y papaya sobre una base de té negro del noroeste de la India. Perfecto frío o caliente, ideal para lo exótico.",temp:"90-95°C",time:"3-5 min"},
{m:"Inti Zen",n:"Ilumine",t:"Té negro",te:"Sí",d:"Breakfast Tea con té negro de Ceylon y Assam, cosechado en altura. El clásico English Breakfast de Inti Zen.",temp:"90-95°C",time:"3-5 min"},
{m:"Inti Zen",n:"Sweet Chai",t:"Infusión",te:"No",d:"Rooibos con naranja y ramas de canela. Un abrazo cálido: dulzura natural del rooibos con notas cítricas y especiadas.",temp:"95-100°C",time:"8-10 min"}
];

var STORE_KEY = "inti_tea_guide_v1";
var state = {};

function loadState(){
  try{
    var raw = localStorage.getItem(STORE_KEY);
    state = raw ? JSON.parse(raw) : {};
  }catch(e){ state = {}; }
}
function saveState(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
}
function getEntry(name){
  if(!state[name]) state[name] = {tried:false, score:0, review:""};
  return state[name];
}

var currentFilter = "all";
var currentSearch = "";
var expanded = {};

function brandBadgeClass(m){ return m === "Inti Hebras" ? "brand-hebras" : "brand-zen"; }

function makeStars(name, score){
  var html = '<div class="stars" data-name="'+escapeAttr(name)+'">';
  for(var i=1;i<=5;i++){
    html += '<button type="button" class="star-btn'+(i<=score?' filled':'')+'" data-val="'+i+'">★</button>';
  }
  html += '</div>';
  return html;
}

function escapeAttr(s){ return s.replace(/"/g,'&quot;'); }
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderList(){
  var list = document.getElementById('list');
  var term = currentSearch.trim().toLowerCase();
  var filtered = TEAS.filter(function(t){
    if(currentFilter==="hebras" && t.m!=="Inti Hebras") return false;
    if(currentFilter==="zen" && t.m!=="Inti Zen") return false;
    if(currentFilter==="probados" && !getEntry(t.n).tried) return false;
    if(currentFilter==="sinteina" && t.te!=="No") return false;
    if(term && t.n.toLowerCase().indexOf(term)===-1 && t.d.toLowerCase().indexOf(term)===-1) return false;
    return true;
  });

  if(filtered.length===0){
    list.innerHTML = '<div class="empty-msg">No encontré ningún té con esos filtros.</div>';
    return;
  }

  var html = "";
  filtered.forEach(function(t){
    var e = getEntry(t.n);
    var isOpen = expanded[t.n] ? " open" : "";
    html += '<div class="card" data-name="'+escapeAttr(t.n)+'">';
    html += '  <div class="card-top">';
    html += '    <div>';
    html += '      <p class="card-name">'+escapeHtml(t.n)+'</p>';
    html += '      <div class="badge-row">';
    html += '        <span class="badge '+brandBadgeClass(t.m)+'">'+t.m+'</span>';
    html += '        <span class="badge '+brandBadgeClass(t.m)+'">'+t.t+'</span>';
    html += '        <span class="badge '+(t.te==="Sí"?"teina-si":"teina-no")+'">'+(t.te==="Sí"?"Con teína":"Sin teína")+'</span>';
    html += '      </div>';
    html += '    </div>';
    if(e.score>0){
      html += '    <div class="score-pill">★ '+e.score+'</div>';
    } else {
      html += '    <div class="score-pill empty">Sin puntuar</div>';
    }
    html += '  </div>';
    html += '  <p class="card-desc">'+escapeHtml(t.d)+'</p>';
    html += '  <div class="card-meta"><span>🌡️ '+t.temp+'</span><span>⏱️ '+t.time+'</span></div>';
    html += '  <div class="card-foot">';
    html += '    <div class="tried-toggle"><div class="switch'+(e.tried?' on':'')+'" data-action="toggle-tried"><div class="dot"></div></div><span>'+(e.tried?'Ya lo probé':'Marcar como probado')+'</span></div>';
    html += '    <button type="button" class="expand-btn" data-action="toggle-expand">'+(expanded[t.n]?'Cerrar':'Puntuar')+'</button>';
    html += '  </div>';
    html += '  <div class="expand-panel'+isOpen+'">';
    html += makeStars(t.n, e.score);
    html += '    <textarea class="review" placeholder="¿Qué te pareció? Sabor, aroma, si lo tomarías de nuevo...">'+escapeHtml(e.review||"")+'</textarea>';
    html += '  </div>';
    html += '</div>';
  });
  list.innerHTML = html;
  attachCardListeners();
  updateStats();
}

function attachCardListeners(){
  var cards = document.querySelectorAll('#list .card');
  cards.forEach(function(card){
    var name = card.getAttribute('data-name');

    var sw = card.querySelector('[data-action="toggle-tried"]');
    sw.addEventListener('click', function(){
      var e = getEntry(name);
      e.tried = !e.tried;
      saveState();
      renderList();
    });

    var expBtn = card.querySelector('[data-action="toggle-expand"]');
    expBtn.addEventListener('click', function(){
      expanded[name] = !expanded[name];
      renderList();
    });

    var stars = card.querySelectorAll('.star-btn');
    stars.forEach(function(starBtn){
      starBtn.addEventListener('click', function(){
        var val = parseInt(starBtn.getAttribute('data-val'),10);
        var e = getEntry(name);
        e.score = (e.score===val) ? 0 : val;
        if(e.score>0) e.tried = true;
        saveState();
        renderList();
      });
    });

    var ta = card.querySelector('textarea.review');
    if(ta){
      ta.addEventListener('input', function(){
        var e = getEntry(name);
        e.review = ta.value;
        saveState();
      });
      ta.addEventListener('blur', function(){
        updateStats();
      });
    }
  });
}

function updateStats(){
  var triedCount = 0, scoreSum = 0, scoreCount = 0;
  var best = null;
  TEAS.forEach(function(t){
    var e = getEntry(t.n);
    if(e.tried) triedCount++;
    if(e.score>0){
      scoreSum += e.score; scoreCount++;
      if(!best || e.score>best.score) best = {n:t.n, score:e.score};
    }
  });
  document.getElementById('stat-tried').textContent = triedCount+'/30';
  document.getElementById('stat-avg').textContent = scoreCount ? (scoreSum/scoreCount).toFixed(1) : '–';
  document.getElementById('stat-fav').textContent = best ? best.n : '–';
}

function renderRanking(){
  var rows = TEAS.map(function(t){
    var e = getEntry(t.n);
    return {n:t.n, m:t.m, score:e.score, review:e.review};
  }).filter(function(r){ return r.score>0; });
  rows.sort(function(a,b){ return b.score-a.score; });

  var el = document.getElementById('ranking-list');
  if(rows.length===0){
    el.innerHTML = '<div class="empty-msg">Todavía no puntuaste ningún té.<br>Probá uno y volvé acá para ver tu ranking.</div>';
    return;
  }
  var html = "";
  rows.forEach(function(r, i){
    html += '<div class="rank-card">';
    html += '  <div class="rank-num'+(i===0?' top1':'')+'">'+(i+1)+'</div>';
    html += '  <div class="rank-body">';
    html += '    <p class="rank-name">'+escapeHtml(r.n)+'</p>';
    if(r.review){
      html += '    <p class="rank-review">'+escapeHtml(r.review)+'</p>';
    }
    html += '  </div>';
    html += '  <div class="rank-score">★ '+r.score+'</div>';
    html += '</div>';
  });
  el.innerHTML = html;
}

var FILTERS = [
  {key:"all", label:"Todos"},
  {key:"hebras", label:"Inti Hebras"},
  {key:"zen", label:"Inti Zen"},
  {key:"sinteina", label:"Sin teína"},
  {key:"probados", label:"Ya probados"}
];

function renderFilters(){
  var wrap = document.getElementById('filters');
  wrap.innerHTML = FILTERS.map(function(f){
    return '<div class="chip'+(currentFilter===f.key?' active':'')+'" data-key="'+f.key+'">'+f.label+'</div>';
  }).join('');
  wrap.querySelectorAll('.chip').forEach(function(chip){
    chip.addEventListener('click', function(){
      currentFilter = chip.getAttribute('data-key');
      renderFilters();
      renderList();
    });
  });
}

document.getElementById('search').addEventListener('input', function(e){
  currentSearch = e.target.value;
  renderList();
});

document.querySelectorAll('.tab').forEach(function(tab){
  tab.addEventListener('click', function(){
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    tab.classList.add('active');
    var key = tab.getAttribute('data-tab');
    document.getElementById('view-list').style.display = key==='list' ? '' : 'none';
    document.getElementById('view-ranking').style.display = key==='ranking' ? '' : 'none';
    if(key==='ranking') renderRanking();
  });
});

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

function exportData(){
  var payload = {
    app: "guia_tes_inti",
    version: 1,
    exportedAt: new Date().toISOString(),
    data: state
  };
  var blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = "mis-tes-backup-"+stamp+".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  showToast("Backup descargado ✓");
}

function importDataFromFile(file){
  var reader = new FileReader();
  reader.onload = function(){
    try{
      var parsed = JSON.parse(reader.result);
      var incoming = parsed && parsed.data ? parsed.data : parsed;
      if(typeof incoming !== "object" || incoming === null){
        showToast("El archivo no tiene un formato válido");
        return;
      }
      var ok = window.confirm("¿Importar este backup? Va a reemplazar tus puntuaciones y reseñas actuales en este celular.");
      if(!ok) return;
      state = incoming;
      saveState();
      renderList();
      renderRanking();
      showToast("Datos importados ✓");
    }catch(e){
      showToast("No se pudo leer el archivo");
    }
  };
  reader.readAsText(file);
}

document.getElementById('btn-export').addEventListener('click', exportData);
document.getElementById('btn-import').addEventListener('click', function(){
  document.getElementById('file-import').click();
});
document.getElementById('file-import').addEventListener('change', function(e){
  var file = e.target.files[0];
  if(file) importDataFromFile(file);
  e.target.value = "";
});

loadState();
renderFilters();
renderList();
</script>
</body>
</html>
